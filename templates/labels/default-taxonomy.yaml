# Canonical label taxonomy — install across every repo in the project.
#
# Locked families (same names + colors across all repos in the project):
#   type:*    — kind of work; mutually exclusive
#   scope:*   — semver signal; mutually exclusive
#   release:* — target release marker (project decides which versions exist)
#
# Project-extensible:
#   phase:*   — project-specific phase grouping (each project picks names)
#   area:*    — subsystem; multi-select OK on a single issue
#
# To install, walk this YAML and run `gh label create` per row. See
# scripts/validate-labels.mjs --fix for a working installer.

version: "1.0.0"

locked:
  # type:* — exactly one per issue
  - { name: "type:epic",        color: "5319E7", description: "Umbrella parent issue with sub-issues" }
  - { name: "type:feature",     color: "0E8A16", description: "New capability" }
  - { name: "type:enhancement", color: "0075CA", description: "Improvement to existing capability" }
  - { name: "type:bug",         color: "D73A4A", description: "Defect" }
  - { name: "type:refactor",    color: "1D76DB", description: "Internal restructure, no behaviour change" }
  - { name: "type:docs",        color: "0052CC", description: "Documentation" }
  - { name: "type:chore",       color: "C5DEF5", description: "Maintenance / infrastructure" }

  # scope:* — exactly one per issue
  - { name: "scope:breaking",   color: "B60205", description: "Breaks backward compatibility" }
  - { name: "scope:additive",   color: "E99695", description: "Additive only; no breaking change" }

# Project-extensible families:
#   phase:*   — yellow `FBCA04` regardless of project
#   area:*    — purple `8B4FBC` regardless of project
#   release:* — green `0E8A16` regardless of project
#
# Each project adds its own labels via:
#   gh label create "phase:my-phase-name" --description "..." --color "FBCA04" --force
project_extensible_color_conventions:
  phase: "FBCA04"
  area: "8B4FBC"
  release: "0E8A16"
